<svg xmlns="http://www.w3.org/2000/svg"
     width="64"
     height="64"
     viewBox="0 0 64 64">

    <!-- Shadow -->
    <ellipse
        cx="32"
        cy="58"
        rx="12"
        ry="3"
        fill="#000"
        opacity=".18"/>

    <!-- Body -->
    <rect
        x="20"
        y="22"
        width="24"
        height="22"
        rx="3"
        fill="#b99274"/>

    <!-- Head -->
    <rect
        x="18"
        y="8"
        width="28"
        height="22"
        rx="4"
        fill="#a78367"/>

    <!-- Ears -->
    <circle
        cx="24"
        cy="10"
        r="4"
        fill="#8e7460"/>

    <circle
        cx="40"
        cy="10"
        r="4"
        fill="#7B5B42"/>

    <!-- Eyes -->
    <circle
        cx="27"
        cy="18"
        r="1.6"
        fill="#111"/>

    <circle
        cx="37"
        cy="18"
        r="1.6"
        fill="#111"/>

    <!-- Nose -->
    <rect
        x="30"
        y="22"
        width="4"
        height="3"
        rx="1"
        fill="#111"/>

    <!-- Legs -->
    <rect
        id="legLeft"
        x="23"
        y="43"
        width="5"
        height="12"
        rx="2"
        fill="#a78975"/>

    <rect
        id="legRight"
        x="36"
        y="43"
        width="5"
        height="12"
        rx="2"
        fill="#a78975"/>

    <!-- Arms -->
    <rect
        id="armLeft"
        x="16"
        y="27"
        width="5"
        height="12"
        rx="2"
        fill="#7d6351"/>

    <rect
        id="armRight"
        x="43"
        y="27"
        width="5"
        height="12"
        rx="2"
        fill="#7d6351"/>

</svg>